<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalFlow · Sistema de Combinaciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #080a0f;
  --s1: #0d1018;
  --s2: #12161f;
  --s3: #181d28;
  --border: #1a2030;
  --border2: #232b3d;
  --long: #00e5a0;
  --long-dim: rgba(0,229,160,0.08);
  --short: #ff4466;
  --short-dim: rgba(255,68,102,0.08);
  --neutral: #f5a623;
  --neutral-dim: rgba(245,166,35,0.08);
  --text: #e4eaf5;
  --muted: #5a6480;
  --muted2: #3a4358;
  --accent: #6b7ef5;
  --accent2: #8a9af8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 24px; }

/* HEADER */
.header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--s1); position: sticky; top:0; z-index:100; }
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), #9b6ef5); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.logo-text { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
.logo-text span { color: var(--accent2); }
.logo-sub { font-size: 9px; color: var(--muted); font-family: var(--mono); letter-spacing: 1.5px; margin-left: 6px; }
.header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.status-bar { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--muted); }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--long); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }
.refresh-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: var(--s3); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }
.refresh-btn.loading .spin { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.countdown-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.countdown-bar-wrap { flex:1; max-width:80px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.countdown-bar { height:100%; background:var(--accent); border-radius:2px; transition:width 1s linear; }
.countdown-text { font-family:var(--mono); font-size:9px; color:var(--muted2); }

/* ADD BAR */
.add-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--s1); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.add-form { display: flex; gap: 6px; flex:1; min-width:200px; }
.add-input { flex:1; background: var(--s3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 11px; color: var(--text); outline: none; text-transform: uppercase; min-width:80px; }
.add-input::placeholder { color: var(--muted); text-transform: none; font-size: 10px; }
.add-input:focus { border-color: var(--accent); }
.add-btn { padding: 8px 16px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: var(--sans); font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.add-btn:hover { background: var(--accent2); }
.combo-selector { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.combo-chip { padding: 4px 10px; background: var(--s3); border: 1px solid var(--border2); border-radius: 6px; font-family: var(--mono); font-size: 8px; letter-spacing: 0.5px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.combo-chip.active { border-color: var(--accent); color: var(--accent2); background: rgba(91,110,245,0.08); }
.combo-chip:hover:not(.active) { border-color: var(--muted2); }

/* TOAST */
.toast { position: fixed; top: 12px; right: 12px; background: var(--s3); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 14px; font-size: 12px; z-index: 999; max-width: 260px; transform: translateX(120%); transition: transform 0.3s ease; }
.toast.show { transform: translateX(0); }
.toast.success { border-color: var(--long); }
.toast.error { border-color: var(--short); }
.toast.info { border-color: var(--accent); }

/* MAIN */
.main { padding: 12px 16px; }
.section-eyebrow { font-family: var(--mono); font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

/* COMBO BADGE ON CARD */
.combo-badge { font-family: var(--mono); font-size: 7px; padding: 1px 6px; border-radius: 3px; background: var(--s3); border: 1px solid var(--border2); color: var(--muted2); letter-spacing: 0.5px; }
.combo-badge.active-combo { border-color: var(--accent); color: var(--accent2); background: rgba(91,110,245,0.06); }

/* ASSET CARD — compacto */
.asset-card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
.asset-card.expanded { border-color: var(--border2); }
.card-summary { display: flex; align-items: center; padding: 10px 12px; cursor: pointer; gap: 8px; transition: background 0.15s; }
.card-summary:active { background: var(--s2); }

.asset-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink:0; background:#fff; padding:4px; box-sizing:border-box; overflow:hidden; position:relative; }
.asset-icon img { width:100%; height:100%; object-fit:contain; display:block; }
.asset-icon .icon-fallback { position:absolute; inset:0; display:none; align-items:center; justify-content:center; border-radius:5px; }

.summary-info { flex:1; min-width:0; }
.asset-ticker { font-family: var(--mono); font-size: 12px; font-weight: 700; line-height:1; margin-bottom:2px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; color:#fff; }
.source-badge { font-family: var(--mono); font-size:7px; padding:1px 4px; border-radius:3px; letter-spacing:0.3px; }
.source-badge.binance { background:rgba(240,185,11,0.12); color:#f0b90b; }
.source-badge.coingecko { background:rgba(91,110,245,0.12); color:var(--accent2); }
.source-badge.hyperliquid { background:rgba(0,229,160,0.12); color:var(--long); }

.ind-badges { display:flex; align-items:center; gap:3px; margin-top:2px; flex-wrap:wrap; }
.ind-badge { font-family: var(--mono); font-size:7px; padding:1px 4px; border-radius:3px; letter-spacing:0.2px; font-weight:700; }
.ind-badge.bull { background:rgba(0,229,160,0.10); color:var(--long); border:1px solid rgba(0,229,160,0.15); }
.ind-badge.bear { background:rgba(255,68,102,0.10); color:var(--short); border:1px solid rgba(255,68,102,0.15); }
.ind-badge.neut { background:rgba(245,166,35,0.10); color:var(--neutral); border:1px solid rgba(245,166,35,0.15); }
.ind-badge.load { background:var(--s3); color:var(--muted); border:1px solid var(--border2); }

.summary-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
.asset-price { font-family: var(--mono); font-size: 13px; font-weight: 700; line-height:1; }
.asset-change { font-family: var(--mono); font-size: 10px; font-weight:500; }
.asset-change.pos { color: var(--long); }
.asset-change.neg { color: var(--short); }
.signal-pill { display:flex; align-items:center; gap:3px; padding:2px 8px; border-radius:5px; font-family: var(--mono); font-size:9px; font-weight:700; letter-spacing:0.5px; }
.signal-pill.LONG { background: var(--long-dim); color: var(--long); border: 1px solid rgba(0,229,160,0.2); }
.signal-pill.SHORT { background: var(--short-dim); color: var(--short); border: 1px solid rgba(255,68,102,0.2); }
.signal-pill.NEUTRAL { background: var(--neutral-dim); color: var(--neutral); border: 1px solid rgba(245,166,35,0.2); }
.chevron { font-size:10px; color:var(--muted); flex-shrink:0; transition:transform 0.25s ease; }
.asset-card.expanded .chevron { transform: rotate(180deg); }

/* EXPANDED */
.card-detail { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
.asset-card.expanded .card-detail { max-height:3000px; border-top:1px solid var(--border); }

/* COMBO HEADER */
.combo-header { padding: 10px 14px 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.combo-header-label { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.combo-header-name { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent2); }
.combo-header-desc { font-size: 10px; color: var(--muted); }

/* SIGNAL BLOCK — versión combo */
.signal-block { padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.signal-badge { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:8px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:1px; flex-shrink:0; }
.signal-badge.LONG { background:var(--long-dim); color:var(--long); border:1px solid rgba(0,229,160,0.25); }
.signal-badge.SHORT { background:var(--short-dim); color:var(--short); border:1px solid rgba(255,68,102,0.25); }
.signal-badge.NEUTRAL { background:var(--neutral-dim); color:var(--neutral); border:1px solid rgba(245,166,35,0.25); }
.signal-reason { font-size:10px; color:var(--muted); line-height:1.4; flex:1; min-width:100px; }
.signal-strength { display:flex; gap:2px; flex-shrink:0; }
.strength-pip { width:5px; height:5px; border-radius:2px; background:var(--border2); }
.strength-pip.active.LONG { background:var(--long); }
.strength-pip.active.SHORT { background:var(--short); }
.strength-pip.active.NEUTRAL { background:var(--neutral); }

/* CONFIDENCE */
.confidence-block { padding:8px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
.confidence-header { display:flex; align-items:flex-start; justify-content:space-between; }
.confidence-label { font-family:var(--mono); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.confidence-val { font-family:var(--mono); font-size:12px; font-weight:700; }
.confidence-val.LONG { color:var(--long); }
.confidence-val.SHORT { color:var(--short); }
.confidence-val.NEUTRAL { color:var(--neutral); }
.confidence-sub { font-size:9px; color:var(--muted); margin-top:1px; }
.confidence-track { height:5px; background:var(--border2); border-radius:4px; overflow:hidden; }
.confidence-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }
.confidence-fill.LONG { background:linear-gradient(90deg,rgba(0,229,160,0.3),var(--long)); }
.confidence-fill.SHORT { background:linear-gradient(90deg,rgba(255,68,102,0.3),var(--short)); }
.confidence-fill.NEUTRAL { background:linear-gradient(90deg,rgba(245,166,35,0.3),var(--neutral)); }

/* FACTOR GRID — compacto */
.factors-grid { display:flex; flex-direction:column; gap:1px; margin-top:4px; }
.factor-group-label { font-family:var(--mono); font-size:7px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 0 2px; border-top:1px solid var(--border); }
.factor-group-label.bull-label { color:var(--long); }
.factor-group-label.bear-label { color:var(--short); }
.factor-group-label.neut-label { color:var(--muted); }
.factor-row { display:flex; align-items:center; justify-content:space-between; padding:3px 6px; border-radius:5px; gap:6px; }
.factor-row.factor-bull { background:rgba(0,229,160,0.05); border:1px solid rgba(0,229,160,0.08); }
.factor-row.factor-bear { background:rgba(255,68,102,0.05); border:1px solid rgba(255,68,102,0.08); }
.factor-row.factor-neut { background:var(--s2); border:1px solid var(--border); }
.factor-name { font-family:var(--mono); font-size:8px; font-weight:700; flex-shrink:0; }
.factor-row.factor-bull .factor-name { color:var(--long); }
.factor-row.factor-bear .factor-name { color:var(--short); }
.factor-row.factor-neut .factor-name { color:var(--muted); }
.factor-note { font-family:var(--mono); font-size:8px; color:var(--text); text-align:right; }

/* MTF — compacto */
.mtf-block { padding:8px 14px; border-bottom:1px solid var(--border); }
.mtf-title { font-family:var(--mono); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.mtf-row { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.mtf-box { background:var(--s2); border:1px solid var(--border); border-radius:7px; padding:5px 6px; text-align:center; }
.mtf-tf { font-family:var(--mono); font-size:7px; color:var(--muted); margin-bottom:2px; }
.mtf-sig { font-family:var(--mono); font-size:9px; font-weight:700; }
.mtf-sig.LONG { color:var(--long); }
.mtf-sig.SHORT { color:var(--short); }
.mtf-sig.NEUTRAL { color:var(--neutral); }
.mtf-sig.loading { color:var(--muted2); }

/* INDICATORS PANEL — compacto */
.indicators-panel { padding:8px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
.ind-panel-title { font-family:var(--mono); font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:1px; }
.ind-row { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.ind-box { background:var(--s2); border:1px solid var(--border); border-radius:7px; padding:6px 5px; text-align:center; }
.ind-box-label { font-family:var(--mono); font-size:6px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.ind-box-val { font-family:var(--mono); font-size:11px; font-weight:700; }
.ind-box-val.bull { color:var(--long); }
.ind-box-val.bear { color:var(--short); }
.ind-box-val.neut { color:var(--neutral); }
.ind-box-sub { font-size:8px; color:var(--muted); margin-top:1px; }

/* VOLUME — compacto */
.vol-block { padding:8px 14px; border-bottom:1px solid var(--border); display:flex; gap:6px; align-items:center; }
.vol-label { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.vol-bars { flex:1; display:flex; align-items:flex-end; gap:1.5px; height:22px; }
.vol-bar { flex:1; border-radius:1.5px 1.5px 0 0; min-height:2px; }
.vol-bar.up { background:rgba(0,229,160,0.5); }
.vol-bar.down { background:rgba(255,68,102,0.5); }
.vol-info { font-family:var(--mono); font-size:9px; text-align:right; flex-shrink:0; }
.vol-ratio.bull { color:var(--long); }
.vol-ratio.bear { color:var(--short); }
.vol-ratio.neut { color:var(--neutral); }

/* ORDER BOOK — compacto */
.ob-block { padding:8px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:5px; }
.ob-title { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:3px; }
.ob-title-badge { font-family:var(--mono); font-size:7px; padding:1px 5px; border-radius:3px; }
.ob-title-badge.liq-alert { background:rgba(255,68,102,0.12); color:var(--short); border:1px solid rgba(255,68,102,0.2); animation:pulse 1.5s infinite; }
.ob-title-badge.liq-ok { background:rgba(0,229,160,0.08); color:var(--long); border:1px solid rgba(0,229,160,0.15); }
.ob-heatmap { display:flex; flex-direction:column; gap:2px; }
.ob-row { display:flex; align-items:center; gap:4px; height:20px; }
.ob-side-label { font-family:var(--mono); font-size:7px; font-weight:700; width:22px; text-align:right; flex-shrink:0; }
.ob-side-label.ask { color:var(--short); }
.ob-side-label.bid { color:var(--long); }
.ob-bar-wrap { flex:1; height:12px; background:var(--s2); border-radius:3px; overflow:hidden; }
.ob-bar { height:100%; border-radius:3px; transition:width 0.4s ease; min-width:2px; }
.ob-bar.ask { background:rgba(255,68,102,0.25); }
.ob-bar.bid { background:rgba(0,229,160,0.25); }
.ob-bar.ask.wall { background:rgba(255,68,102,0.7); box-shadow:0 0 6px rgba(255,68,102,0.3); }
.ob-bar.bid.wall { background:rgba(0,229,160,0.7); box-shadow:0 0 6px rgba(0,229,160,0.3); }
.ob-qty { font-family:var(--mono); font-size:7px; width:34px; text-align:right; flex-shrink:0; }
.ob-qty.ask { color:var(--short); }
.ob-qty.bid { color:var(--long); }
.ob-price { font-family:var(--mono); font-size:8px; font-weight:700; width:48px; text-align:right; flex-shrink:0; color:var(--text); }
.ob-price-divider { font-family:var(--mono); font-size:7px; color:var(--muted2); text-align:center; padding:2px 0; letter-spacing:1px; }
.ob-summary { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:2px; }
.ob-summary-box { background:var(--s2); border:1px solid var(--border); border-radius:6px; padding:5px 8px; text-align:center; }
.ob-summary-label { font-family:var(--mono); font-size:6px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:1px; }
.ob-summary-val { font-family:var(--mono); font-size:9px; font-weight:700; }

/* TP/SL — compacto */
.tpsl-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; padding:8px 14px; border-bottom:1px solid var(--border); }
.tpsl-box { background:var(--s2); border:1px solid var(--border); border-radius:6px; padding:5px 6px; text-align:center; }
.tpsl-label { font-family:var(--mono); font-size:7px; letter-spacing:1px; margin-bottom:2px; }
.tpsl-label.sl { color:var(--short); }
.tpsl-label.tp1 { color:var(--long); }
.tpsl-label.tp2 { color:var(--accent2); }
.tpsl-value { font-family:var(--mono); font-size:9px; font-weight:700; }
.tpsl-pct { font-size:8px; color:var(--muted); margin-top:1px; }

/* LEVELS — compacto */
.levels-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:8px 14px; border-bottom:1px solid var(--border); }
.level-group-label { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
.level-group-label.support { color:var(--long); }
.level-group-label.resistance { color:var(--short); }
.level-item { display:flex; justify-content:space-between; align-items:center; padding:3px 6px; background:var(--s2); border-radius:5px; margin-bottom:2px; border:1px solid var(--border); }
.level-label { font-size:8px; color:var(--muted); }
.level-price { font-family:var(--mono); font-size:9px; font-weight:700; }
.level-price.support { color:var(--long); }
.level-price.resistance { color:var(--short); }

/* TIMESTAMP */
.signal-timestamp { display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--s2); border-top:1px solid var(--border); margin:0 14px 10px; border-radius:8px; }
.ts-icon { font-size:13px; flex-shrink:0; }
.ts-info { flex:1; }
.ts-label { font-family:var(--mono); font-size:7px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.ts-datetime { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--text); margin-bottom:1px; }
.ts-elapsed { font-family:var(--mono); font-size:8px; color:var(--muted); }
.ts-elapsed span { color:var(--accent2); font-weight:700; }

/* TRADE BTN */
.trade-btn-wrap { padding:8px 14px 4px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
.trade-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 14px; border:none; border-radius:10px; font-family:var(--sans); fon
